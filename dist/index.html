<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediSync - Login</title>
    <meta
      name="description"
      content="MediSync Medicine Inventory System - Admin Login"
    />
    <link
      rel="stylesheet"
      href="/static/css/style.css"
    />
  </head>
  <body>
    <div class="login-page">
      <div class="login-bg">
        <img src="static/images/bg1.jpg" alt="Background" />
      </div>
      <div class="login-container">
        <div class="login-card">
          <div class="login-logos">
            <div class="logo-placeholder"><img src="static/images/logo1.png" alt="Logo 1" /></div>
            <div class="logo-placeholder"><img src="static/images/logo2.jpg" alt="Logo 2" /></div>
            <div class="logo-placeholder"><img src="static/images/logo3.jpg" alt="Logo 3" /></div>
          </div>
          <h1 class="login-title">MediSync</h1>
          <p class="login-subtitle">Medicine Inventory Management System</p>
          <form id="loginForm" autocomplete="off">
            <div class="form-group">
              <label for="username">Username</label>
              <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Enter your username"
                required
              />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Enter your password"
                required
              />
            </div>
            <div
              id="loginError"
              style="
                color: var(--coral);
                font-size: 0.85rem;
                font-weight: 600;
                margin-bottom: 12px;
                display: none;
              "
            ></div>
            <button
              type="submit"
              class="btn btn-primary btn-block btn-lg"
              id="loginBtn"
              style="margin-bottom: 20px;"
            >
              Sign In
            </button>
          </form>
          <div class="login-info" style="border-top: 1px solid var(--border); padding-top: 20px; font-size: 0.8rem; color: var(--text-muted); text-align: center;">
              <p style="margin-bottom: 8px;">By signing in, you agree to our <strong>Data Privacy Policy</strong> and system terms of use.</p>
              <div style="display: flex; justify-content: center; gap: 12px; font-weight: 600;">
                  <a href="#" style="color: var(--primary);">System Status</a>
                  <a href="#" style="color: var(--primary);">User Guide</a>
              </div>
          </div>
        </div>
        <div style="text-align: center; margin-top: 24px; color: rgba(255,255,255,0.7); font-size: 0.85rem;">
            &copy; 2026 MediSync. Optimized for local health center management.
        </div>
      </div>
    </div>
    <script src="/static/js/login.js"></script>
  </body>
</html>
